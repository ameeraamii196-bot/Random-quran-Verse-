<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description"
    content="Discover random Quranic verses with Arabic text, English translation, and audio recitation." />
  <title>Quran — Daily Verse</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Inter:wght@300;400;500;600&display=swap"
    rel="stylesheet" />

  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: {
            arabic: ['Amiri', 'serif'],
            sans: ['Inter', 'sans-serif'],
          },
          colors: {
            parchment: {
              50: '#fdfaf4',
              100: '#f9f1e0',
              200: '#f1deb8',
            },
            emerald: {
              800: '#065f46',
              900: '#064e3b',
            },
          },
          animation: {
            'fade-in': 'fadeIn 0.6s ease forwards',
            'pulse-slow': 'pulse 2s cubic-bezier(0.4,0,0.6,1) infinite',
          },
          keyframes: {
            fadeIn: {
              '0%': { opacity: '0', transform: 'translateY(16px)' },
              '100%': { opacity: '1', transform: 'translateY(0)' },
            },
          },
        },
      },
    };
  </script>

  <link rel="stylesheet" href="style.css" />
</head>

<body class="min-h-screen bg-[#0d1f1a] text-[#e8dfc8] font-sans flex flex-col">

  <!-- ── Header ── -->
  <header class="w-full flex items-center justify-between px-6 py-4 border-b border-white/10">
    <div class="flex items-center gap-3">
      <span class="text-2xl select-none" aria-hidden="true">☽</span>
      <span class="text-lg font-semibold tracking-wide text-[#a8d5b5]">Heart Heal</span>
    </div>
    <span class="text-xs text-white/40 font-light tracking-widest uppercase">Quranic Verse</span>
  </header>

  <!-- ── Main ── -->
  <main class="flex-1 flex items-center justify-center px-4 py-12">
    <div class="w-full max-w-2xl">

      <!-- Card -->
      <div id="verse-card"
        class="relative rounded-3xl border border-white/10 bg-white/5 backdrop-blur-sm shadow-2xl overflow-hidden p-8 md:p-12">

        <!-- Decorative corner ornament -->
        <div class="absolute top-0 right-0 w-32 h-32 opacity-5 pointer-events-none" aria-hidden="true">
          <svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M100 0 Q60 0 0 100" stroke="#a8d5b5" stroke-width="1" />
            <path d="M100 0 Q80 20 20 100" stroke="#a8d5b5" stroke-width="1" />
          </svg>
        </div>

        <!-- ── Skeleton / Loading state ── -->
        <div id="skeleton" class="space-y-6 animate-pulse-slow" aria-label="Loading verse…" role="status">
          <div class="flex justify-center">
            <div class="h-6 w-40 rounded-full bg-white/10"></div>
          </div>
          <div class="space-y-3 text-right">
            <div class="h-7 w-full rounded bg-white/10"></div>
            <div class="h-7 w-4/5 ml-auto rounded bg-white/10"></div>
            <div class="h-7 w-3/4 ml-auto rounded bg-white/10"></div>
          </div>
          <div class="border-t border-white/10 pt-5 space-y-2">
            <div class="h-4 w-full rounded bg-white/10"></div>
            <div class="h-4 w-11/12 rounded bg-white/10"></div>
            <div class="h-4 w-3/4 rounded bg-white/10"></div>
          </div>
        </div>

        <!-- ── Verse content ── -->
        <div id="verse-content" class="hidden space-y-7 animate-fade-in">

          <!-- Surah / Ayah badge -->
          <div class="flex items-center justify-center gap-2">
            <span class="inline-flex items-center gap-1.5 px-4 py-1.5 rounded-full text-xs font-medium
                         bg-[#a8d5b5]/15 text-[#a8d5b5] border border-[#a8d5b5]/30 tracking-wide uppercase">
              <svg class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20" aria-hidden="true">
                <path fill-rule="evenodd"
                  d="M10 18a8 8 0 100-16 8 8 0 000 16zm1-12a1 1 0 10-2 0v4a1 1 0 00.293.707l2.828 2.829a1 1 0 101.415-1.415L11 9.586V6z"
                  clip-rule="evenodd" />
              </svg>
              <span id="surah-info">Surah Al-Fatiha • 1:1</span>
            </span>
          </div>

          <!-- Arabic text -->
          <div class="text-right leading-loose" dir="rtl" lang="ar">
            <p id="arabic-text" class="font-arabic text-3xl md:text-4xl text-[#e8dfc8] leading-[2.2]">
            </p>
          </div>

          <!-- Divider with ornament -->
          <div class="flex items-center gap-4 opacity-30" aria-hidden="true">
            <div class="flex-1 h-px bg-white/20"></div>
            <span class="text-sm">✦</span>
            <div class="flex-1 h-px bg-white/20"></div>
          </div>

          <!-- English translation -->
          <div>
            <p class="text-xs font-medium uppercase tracking-widest text-white/40 mb-3">Translation — Sahih
              International</p>
            <p id="translation-text" class="text-[#cfc9b8] text-base md:text-lg leading-relaxed font-light italic">
            </p>
          </div>

          <!-- Audio player -->
          <div class="flex items-center gap-4 pt-2">
            <button id="play-btn" aria-label="Play recitation" class="play-btn flex items-center gap-2 px-5 py-2.5 rounded-full
                           bg-[#a8d5b5]/20 border border-[#a8d5b5]/40 text-[#a8d5b5]
                           text-sm font-medium hover:bg-[#a8d5b5]/30 active:scale-95
                           transition-all duration-200 focus:outline-none focus:ring-2 focus:ring-[#a8d5b5]/50">
              <svg id="play-icon" class="w-4 h-4" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M8 5v14l11-7z" />
              </svg>
              <svg id="pause-icon" class="w-4 h-4 hidden" fill="currentColor" viewBox="0 0 24 24" aria-hidden="true">
                <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z" />
              </svg>
              <span id="play-label">Play Recitation</span>
            </button>

            <!-- Audio progress bar -->
            <div class="flex-1 hidden" id="progress-container">
              <div class="relative h-1.5 rounded-full bg-white/10 overflow-hidden">
                <div id="progress-bar"
                  class="absolute left-0 top-0 h-full rounded-full bg-[#a8d5b5] transition-all duration-300"
                  style="width:0%"></div>
              </div>
            </div>
          </div>

          <!-- Hidden native audio element -->
          <audio id="audio-el" preload="none"></audio>
        </div>

        <!-- ── Error state ── -->
        <div id="error-state" class="hidden text-center space-y-4 py-4">
          <span class="text-4xl" aria-hidden="true">🕌</span>
          <p class="text-white/60 text-sm" id="error-msg">Could not load verse. Please check your connection.</p>
          <button onclick="loadVerse()"
            class="text-[#a8d5b5] text-sm underline underline-offset-4 hover:text-white transition-colors">
            Try again
          </button>
        </div>

      </div><!-- /card -->

      <!-- ── New Verse button ── -->
      <div class="mt-8 flex justify-center">
        <button id="new-verse-btn" aria-label="Show a new random Quranic verse" onclick="loadVerse()" class="group flex items-center gap-3 px-8 py-3.5 rounded-full
                       bg-[#a8d5b5] text-[#0d1f1a] font-semibold text-sm
                       hover:bg-[#b8e5c5] active:scale-95 transition-all duration-200
                       shadow-lg shadow-[#a8d5b5]/20 focus:outline-none focus:ring-2 focus:ring-[#a8d5b5]">
          <svg class="w-4 h-4 group-hover:rotate-180 transition-transform duration-500" fill="none"
            stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24" aria-hidden="true">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" />
          </svg>
          New Verse
        </button>
      </div>

      <!-- Footer note -->
      <p class="text-center text-white/25 text-xs mt-8 font-light">
        Recitation by Mishary Rashid Alafasy
        made with ❤️ by Ameera
      </p>

    </div>
  </main>

</body>
<script src="script.js"></script>

</html>
